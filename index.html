<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tamil Form Assistant – Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SPLASH PAGE -->
<div id="splashPage" class="page splash active">
  <img src="front page.jpeg" alt="Splash Screen">
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page app">
  <h2>Login (உள்நுழைவு)</h2>

  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script src="script.js"></script>
</body>
</html>
